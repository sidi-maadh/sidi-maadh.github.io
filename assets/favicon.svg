<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="gA" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#6366f1"/></linearGradient>
    <linearGradient id="gB" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#3b82f6"/></linearGradient>
    <linearGradient id="gC" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3b82f6"/><stop offset="1" stop-color="#06b6d4"/></linearGradient>
    <linearGradient id="gD" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06b6d4"/><stop offset="1" stop-color="#34d399"/></linearGradient>
  </defs>
  <!-- Background -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="#0a0c10"/>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#gA)" fill-opacity="0.08"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="16" fill="none" stroke="url(#gB)" stroke-opacity="0.25" stroke-width="1"/>

  <!-- 4-letter monogram in 2x2 grid, each letter in its own quadrant -->
  <g font-family="'Sora', system-ui, sans-serif" font-weight="800" font-size="20" letter-spacing="-1">
    <!-- S top-left -->
    <text x="20" y="29" text-anchor="middle" fill="url(#gA)">S</text>
    <!-- C top-right -->
    <text x="44" y="29" text-anchor="middle" fill="url(#gB)">C</text>
    <!-- A bottom-left -->
    <text x="20" y="52" text-anchor="middle" fill="url(#gC)">A</text>
    <!-- M bottom-right -->
    <text x="44" y="52" text-anchor="middle" fill="url(#gD)">M</text>
  </g>

  <!-- Connecting diagonal accent line -->
  <line x1="14" y1="14" x2="50" y2="50" stroke="url(#gB)" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="2 3"/>
</svg>
