<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- Main background gradient (matches portfolio palette) -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="60%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0c10"/>
    </radialGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="hood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#94a3b8" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#475569" stop-opacity="0.9"/>
    </linearGradient>
    <!-- Subtle glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Circle background -->
  <circle cx="160" cy="160" r="156" fill="url(#bgGrad)"/>
  <circle cx="160" cy="160" r="155" fill="none" stroke="url(#purple)" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- Decorative orbit lines -->
  <circle cx="160" cy="160" r="130" fill="none" stroke="url(#blue)" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="160" cy="160" r="110" fill="none" stroke="url(#cyan)" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Floating code symbols (decorative) -->
  <g opacity="0.4" font-family="'JetBrains Mono', monospace" font-weight="600">
    <text x="50" y="80" fill="#8b5cf6" font-size="14">&lt;/&gt;</text>
    <text x="245" y="95" fill="#3b82f6" font-size="12">{ }</text>
    <text x="60" y="260" fill="#06b6d4" font-size="11">AI</text>
    <text x="250" y="250" fill="#34d399" font-size="13">ML</text>
    <text x="35" y="170" fill="#8b5cf6" font-size="10">01</text>
    <text x="270" y="175" fill="#6366f1" font-size="10">10</text>
  </g>

  <!-- Shoulders / torso -->
  <path d="M70 320 Q70 240 160 235 Q250 240 250 320 Z" fill="url(#hood)"/>

  <!-- Hoodie strings -->
  <line x1="142" y1="245" x2="142" y2="280" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="178" y1="245" x2="178" y2="280" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <circle cx="142" cy="282" r="3" fill="#1e1b4b" opacity="0.6"/>
  <circle cx="178" cy="282" r="3" fill="#1e1b4b" opacity="0.6"/>

  <!-- Hoodie hood (back of head) -->
  <ellipse cx="160" cy="150" rx="78" ry="82" fill="url(#hood)"/>

  <!-- Head / face -->
  <ellipse cx="160" cy="155" rx="62" ry="70" fill="url(#skin)"/>

  <!-- Hood inner shadow on top of face -->
  <path d="M98 130 Q160 100 222 130 Q222 145 222 155 Q160 95 98 155 Q98 145 98 130 Z" fill="#1e1b4b" opacity="0.4"/>
  <path d="M98 105 Q160 60 222 105 L222 145 Q160 95 98 145 Z" fill="url(#hood)"/>

  <!-- Hair edge (top) -->
  <path d="M105 145 Q160 110 215 145 L215 155 Q160 135 105 155 Z" fill="#0f172a" opacity="0.5"/>

  <!-- Glasses (signature tech-bro look) -->
  <g stroke="#06b6d4" stroke-width="2.5" fill="none">
    <circle cx="138" cy="170" r="14"/>
    <circle cx="182" cy="170" r="14"/>
    <line x1="152" y1="170" x2="168" y2="170"/>
  </g>
  <!-- Lens reflection -->
  <circle cx="134" cy="166" r="3" fill="#06b6d4" opacity="0.4"/>
  <circle cx="178" cy="166" r="3" fill="#06b6d4" opacity="0.4"/>

  <!-- Eyes behind glasses (subtle) -->
  <circle cx="138" cy="170" r="2.5" fill="#0a0c10"/>
  <circle cx="182" cy="170" r="2.5" fill="#0a0c10"/>

  <!-- Nose hint (very subtle) -->
  <line x1="160" y1="180" x2="158" y2="195" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Smile / mouth -->
  <path d="M148 207 Q160 215 172 207" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Accent dots around -->
  <circle cx="80" cy="200" r="3" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="245" cy="200" r="3" fill="#06b6d4" opacity="0.8"/>
  <circle cx="100" cy="50" r="2.5" fill="#34d399" opacity="0.6"/>
</svg>
